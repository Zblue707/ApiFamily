<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MendozaMartinez</title>
  <script>
    var pathSegmentsToKeep = 1;
    var locationInfo = window.location;
    var newUrl =
      locationInfo.protocol +
      '//' +
      locationInfo.hostname +
      (locationInfo.port ? ':' + locationInfo.port : '') +
      locationInfo.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
      '/?/' +
      locationInfo.pathname
        .slice(1)
        .split('/')
        .slice(pathSegmentsToKeep)
        .join('/')
        .replace(/&/g, '~and~') +
      (locationInfo.search ? '&' + locationInfo.search.slice(1).replace(/&/g, '~and~') : '') +
      locationInfo.hash;

    locationInfo.replace(newUrl);
  </script>
</head>
<body></body>
</html>
