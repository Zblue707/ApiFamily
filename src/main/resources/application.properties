# Frontend URL configuration
# Supports environment variable override for flexibility across deployments.
# Defaults to the Railway production frontend domain.
app.frontend-url=${APP_FRONTEND_URL:https://apifamily-production.up.railway.app}
app.frontend-origin=${APP_FRONTEND_ORIGIN:https://apifamily-production.up.railway.app}

# Session cookie configuration
# Secure cookies are required for cross-origin OAuth flows in production.
server.servlet.session.cookie.secure=${SERVER_SERVLET_SESSION_COOKIE_SECURE:true}
server.servlet.session.cookie.same-site=${SERVER_SERVLET_SESSION_COOKIE_SAME_SITE:lax}
